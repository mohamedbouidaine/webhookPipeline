name: CI

on:
  push:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start test database
        run: docker compose -f docker-compose.test.yml up -d --wait postgres-test

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5433/webhook_pipeline_test
        run: npm test