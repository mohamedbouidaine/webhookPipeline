name: CI

on:
  push:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start test database
        run: docker compose -f docker-compose.test.yml up -d postgres-test

      - name: Wait for test database healthcheck
        run: |
          set -e
          CONTAINER_ID=$(docker compose -f docker-compose.test.yml ps -q postgres-test)
          for i in {1..30}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER_ID")
            if [ "$STATUS" = "healthy" ]; then
              echo "postgres-test is healthy"
              exit 0
            fi
            echo "Waiting for postgres-test to become healthy (current: $STATUS)"
            sleep 2
          done
          echo "postgres-test did not become healthy in time"
          docker compose -f docker-compose.test.yml logs postgres-test
          exit 1

      - name: Lint
        run: npm run lint

      - name: Test
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5433/webhook_pipeline_test
          PORT: 3001
          WORKER_POLL_INTERVAL: 1000
          MAX_DELIVERY_ATTEMPTS: 3
          NODE_ENV: test
        run: npm test

      - name: Build
        run: npm run build

      - name: Tear down test database
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
